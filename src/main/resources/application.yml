spring:
  application:
    name: clinic-api

  profiles:
    active: dev

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS0xMjM0NTY3ODkw}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info